site_name: repoindex
site_description: A filesystem git catalog — collection-aware metadata index for local git repositories
site_author: Alexander Towell
site_url: https://queelius.github.io/repoindex
repo_url: https://github.com/queelius/repoindex
repo_name: queelius/repoindex
docs_dir: docs
site_dir: site
theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  language: en
  icon:
    repo: fontawesome/brands/github-alt

nav:
  - Home: index.md
  - Tags & Queries: catalog-query.md
  - Events: events.md
  - Ops & Audit: ops.md
  - Render Formats: render.md
  - Shell: shell-vfs.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/queelius
      name: Alexander Towell on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/user/queelius
      name: queelius on PyPI
    - icon: fontawesome/brands/orcid
      link: https://orcid.org/0000-0001-6443-9897
      name: ORCID 0000-0001-6443-9897

copyright: Copyright &copy; 2025-2026 Alexander Towell (Alex Towell)

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
